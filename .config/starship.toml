# Don't print a blank line between shell prompts
add_newline = false

# Sperate the prompt into two lines
[line_break]
disabled = false

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

# Timeout for commands executed by starship
command_timeout = 100

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 100

[character]
success_symbol = "[❯](bold green) "
error_symbol = "[✗](bold red) "

[directory]
read_only = " "
truncation_length = 5
truncation_symbol = "…/"

[c]
symbol = " "

[golang]
symbol = " "

[python]
symbol = " "
